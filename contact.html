<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | StudyBoost</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Patrick+Hand&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>
    <!-- Navigation Bar Start -->
    <header class="site-header">
      <nav class="nav" aria-label="Primary navigation">
        <a class="logo" href="index.html"><span class="logo-mark">SB</span><span class="logo-text">StudyBoost</span></a>
        <button class="menu-toggle" type="button" aria-label="Open navigation menu" aria-expanded="false"><span></span><span></span><span></span></button>
        <div class="nav-links" id="navLinks">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="products.html">Products</a>
          <a href="cart.html">Cart</a>
          <a href="contact.html" class="active">Contact</a>
        </div>
        <a class="cart-button" href="cart.html" aria-label="View cart"><span aria-hidden="true">&#128722;</span><span class="cart-count" data-cart-count>0</span></a>
      </nav>
    </header>
    <!-- Navigation Bar End -->

    <main>
      <!-- Contact Section Start -->
      <section class="contact section-band reveal">
        <div class="contact-copy">
          <p class="eyebrow">Need help?</p>
          <h1>Send a little note.</h1>
          <p>Questions about template access, digital delivery, or custom student bundles are welcome.</p>
        </div>
        <form class="contact-form">
          <label>Name<input type="text" placeholder="Your name" required /></label>
          <label>Email<input type="email" placeholder="you@example.com" required /></label>
          <label>Message<textarea rows="5" placeholder="How can StudyBoost help?" required></textarea></label>
          <button class="button primary" type="submit">Send Message</button>
        </form>
      </section>
      <!-- Contact Section End -->
    </main>

    <footer class="footer"><div class="footer-inner"><a class="logo" href="index.html"><span class="logo-mark">SB</span><span class="logo-text">StudyBoost</span></a><p>&copy; 2026 StudyBoost.</p></div></footer>
    <script src="js/cart.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/animations.js" defer></script>
  </body>
</html>
