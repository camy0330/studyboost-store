<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart | StudyBoost</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Patrick+Hand&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/cart.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>
    <!-- Navigation Bar Start -->
    <header class="site-header">
      <nav class="nav" aria-label="Primary navigation">
        <a class="logo" href="index.html"><span class="logo-mark">SB</span><span class="logo-text">StudyBoost</span></a>
        <button class="menu-toggle" type="button" aria-label="Open navigation menu" aria-expanded="false"><span></span><span></span><span></span></button>
        <div class="nav-links" id="navLinks">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="products.html">Products</a>
          <a href="cart.html" class="active">Cart</a>
          <a href="contact.html">Contact</a>
        </div>
        <a class="cart-button" href="cart.html" aria-label="View cart"><span aria-hidden="true">&#128722;</span><span class="cart-count" data-cart-count>0</span></a>
      </nav>
    </header>
    <!-- Navigation Bar End -->

    <main>
      <!-- Cart Page Start -->
      <section class="section-band reveal">
        <div class="section-heading">
          <p class="eyebrow">Your cart</p>
          <h1>Review your study picks.</h1>
          <p>Update quantities, apply a simulated promo code, and continue to checkout.</p>
        </div>

        <div class="cart-layout">
          <div class="cart-page-items" id="cartPageItems"></div>

          <aside class="cart-summary" aria-label="Cart summary">
            <h2>Order summary</h2>
            <label class="promo-field" for="promoCode">
              <span>Promo code</span>
              <div>
                <input type="text" id="promoCode" placeholder="Try STUDY10" />
                <button type="button" id="applyPromo">Apply</button>
              </div>
            </label>
            <p class="promo-message" id="promoMessage" aria-live="polite"></p>
            <div class="summary-row"><span>Subtotal</span><strong id="cartSubtotal">RM0</strong></div>
            <div class="summary-row"><span>Discount</span><strong id="cartDiscount">-RM0</strong></div>
            <div class="summary-row total-row"><span>Total</span><strong id="cartTotal">RM0</strong></div>
            <a class="button primary full" id="checkoutLink" href="checkout.html">Continue to Checkout</a>
          </aside>
        </div>
      </section>
      <!-- Cart Page End -->
    </main>

    <footer class="footer"><div class="footer-inner"><a class="logo" href="index.html"><span class="logo-mark">SB</span><span class="logo-text">StudyBoost</span></a><p>&copy; 2026 StudyBoost.</p></div></footer>
    <script src="js/cart.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/animations.js" defer></script>
  </body>
</html>
